<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EchoVerse{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'css/styles.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
</head>
<body>

<header>
    <h1>Welcome to EchoVerse</h1> 
    <nav>
        <a href="{% url 'ThoughtStream:home' %}">Home</a>
        <a href="{% url 'post_list' %}">Posts</a>
        {% if user.is_authenticated %}
            <a href="{% url 'profile' %}">{{ user.username }}</a>
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'signup' %}">Sign Up</a>
        {% endif %}
    </nav>
</header>

<main>
    {% block content %}
    <!-- Content will be injected here from child templates -->
    {% endblock %}
</main>

<footer>
    <p>&copy; <script>document.write(new Date().getFullYear())</script> EchoVerse. All rights reserved.</p>
    <p><a href="{% url 'contact' %}">Contact Us</a></p>
</footer>

</body>
</html>
