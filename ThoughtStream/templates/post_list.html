<h2>All Posts</h2>
<a href="{% url 'post-create' %}">Create New Post</a>
<ul>
    {% for post in posts %}
        <li>
            <a href="{% url 'post-detail' post.pk %}">{{ post.title }}</a>
            <small>by {{ post.author }} on {{ post.created_at }}</small>
        </li>
    {% endfor %}
</ul>
